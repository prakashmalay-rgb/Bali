name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'Bali/bali-code/bali-code/easybali-backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'Bali/bali-code/bali-code/easybali-backend/**'

jobs:
  lint:
    name: Syntax & Regression Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Bali/bali-code/bali-code/easybali-backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: Bali/bali-code/bali-code/easybali-backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check (py_compile)
        run: |
          find . -name "*.py" -not -path "./.git/*" | xargs python -m py_compile

      - name: Payment split regression test
        run: |
          python -c "
          # SP 70%, Villa 20%, EB remainder — must always sum to total
          def split(total):
              sp = int(total * 0.70)
              villa = int(total * 0.20)
              eb = total - sp - villa
              assert sp + villa + eb == total, f'Split mismatch: {sp}+{villa}+{eb} != {total}'

          for amount in [500, 100000, 250000, 1500000]:
              split(amount)
          print('Payment split regression: PASS')
          "

      - name: SP reassignment logic test
        run: |
          python -c "
          # When SP declines, declined_by grows and remaining SPs shrink
          all_sps = ['SP1', 'SP2', 'SP3']
          declined = []

          def get_remaining(all_sps, declined):
              return [sp for sp in all_sps if sp not in declined]

          declined.append('SP1')
          remaining = get_remaining(all_sps, declined)
          assert 'SP1' not in remaining, 'Declined SP must not be re-offered'
          assert len(remaining) == 2, f'Expected 2 remaining, got {len(remaining)}'

          declined.extend(['SP2', 'SP3'])
          remaining = get_remaining(all_sps, declined)
          assert remaining == [], 'All declined should leave empty list'
          print('SP reassignment regression: PASS')
          "

      - name: Webhook handler — no conflicting middleware decorators
        run: |
          python -c "
          import ast, sys

          with open('app/routes/whatsapp_routes.py') as f:
              source = f.read()

          tree = ast.parse(source)

          # Find all decorated functions and check for @limiter.limit usage
          # A second Limiter instance in a route file conflicts with app.state.limiter
          for node in ast.walk(tree):
              if isinstance(node, (ast.AsyncFunctionDef, ast.FunctionDef)):
                  for dec in node.decorator_list:
                      dec_str = ast.dump(dec)
                      if 'limiter' in dec_str and 'limit' in dec_str:
                          print(f'FAIL: @limiter.limit() decorator found on {node.name} — use global rate limiter only')
                          sys.exit(1)

          # Check no second Limiter() instantiation exists in route files
          for node in ast.walk(tree):
              if isinstance(node, ast.Assign):
                  val_str = ast.dump(node.value)
                  if 'Limiter' in val_str:
                      print('FAIL: Limiter() instance created in route file — import from main or use global only')
                      sys.exit(1)

          print('Webhook handler structure check: PASS')
          "

  security:
    name: Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Bali/bali-code/bali-code/easybali-backend
    # Run audit but don't block on it — surface vulnerabilities without breaking CI
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit -r requirements.txt --output-format=columns

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: lint

    steps:
      - name: Trigger Render deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" | python -c "
          import sys, json
          d = json.load(sys.stdin)
          print('Deploy triggered:', d.get('deploy', {}).get('id', 'unknown'))
          "

  smoke:
    name: Production Smoke Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: deploy

    steps:
      - name: Wait for Render deploy (120s)
        run: sleep 120

      - name: Health check — live
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://bali-v92r.onrender.com/health/live)
          echo "HTTP status: $STATUS"
          [ "$STATUS" -eq 200 ] || (echo "Health check FAILED" && exit 1)

      - name: Health check — readiness (DB)
        run: |
          BODY=$(curl -s https://bali-v92r.onrender.com/health/ready)
          echo "Response: $BODY"
          echo "$BODY" | python -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ready', f'Not ready: {d}'"
          echo "Readiness check: PASS"
